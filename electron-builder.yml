appId: io.darkharasho.axiom
productName: AxiOM
directories:
  output: dist_out
files:
  - dist/**
  - dist-electron/**
  - public/**
publish:
  provider: github
  owner: darkharasho
  repo: axiom
linux:
  target:
    - AppImage
  icon: public/AxiOM-White.png
win:
  target:
    - nsis
  icon: public/AxiOM.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/AxiOM.ico
  uninstallerIcon: public/AxiOM.ico
