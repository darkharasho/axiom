appId: io.darkharasho.axiom
productName: AxiOM
directories:
  output: dist_out
files:
  - dist/**
  - dist-electron/**
  - public/**
publish:
  provider: github
  owner: darkharasho
  repo: axiom
  releaseType: release
linux:
  target:
    - AppImage
  icon: build/icon.png
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
